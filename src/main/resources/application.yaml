server:
  port: ${PORT:8080}

spring:
  application:
    name: asbl-club
  messages:
    fallback-to-system-locale: false
  devtools:
    restart:
      exclude: db/migration/**
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ASBL Club
    description: Management portal for associations
    version: 1.0.0

