<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Log in</title>
</head>
<body>
<nav>
    <a th:href="@{/login(lang='fr')}" th:text="#{lang.fr}">Français</a>
    <a th:href="@{/login(lang='nl')}" th:text="#{lang.nl}">Nederlands</a>
    <a th:href="@{/login(lang='en')}" th:text="#{lang.en}">English</a>
</nav>

<h1 th:text="#{login.title}">Log in</h1>

<p th:if="${param.registered != null}" th:text="#{login.registered}">Account created</p>
<p th:if="${param.error != null}" th:text="#{login.error}">Error</p>
<p th:if="${param.logout != null}" th:text="#{login.logout}">Logged out</p>

<form th:action="@{/login}" method="post">
    <div>
        <label for="username" th:text="#{login.email}">Email address</label>
        <input type="email" id="username" name="username">
    </div>
    <div>
        <label for="password" th:text="#{login.password}">Password</label>
        <input type="password" id="password" name="password">
    </div>
    <button type="submit" th:text="#{login.submit}">Log in</button>
</form>

<p><a th:href="@{/register}" th:text="#{login.noAccount}">No account yet</a></p>
</body>
</html>
