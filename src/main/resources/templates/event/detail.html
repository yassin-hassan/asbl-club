<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title th:text="${event.title}">Event</title>
</head>
<body>
<nav>
    <a th:href="@{/asbls/{slug}/events/{eventId}(slug=${asbl.slug},eventId=${event.id},lang='fr')}" th:text="#{lang.fr}">Français</a>
    <a th:href="@{/asbls/{slug}/events/{eventId}(slug=${asbl.slug},eventId=${event.id},lang='nl')}" th:text="#{lang.nl}">Nederlands</a>
    <a th:href="@{/asbls/{slug}/events/{eventId}(slug=${asbl.slug},eventId=${event.id},lang='en')}" th:text="#{lang.en}">English</a>
</nav>

<h1 th:text="${event.title}">Event</h1>
<p th:text="${event.description}">Description</p>
<p><span th:text="#{event.startsAt}">Start</span> <span th:text="${event.startsAt}">…</span></p>
<p><span th:text="#{event.location}">Location</span> <span th:text="${event.location}">…</span></p>
<p><span th:text="#{event.visibility}">Visibility</span> <span th:text="${event.visibility}">…</span></p>
<p><span th:text="#{event.status}">Status</span> <span th:text="${event.status}">…</span></p>

<h2 th:text="#{tickets.title}">Ticket categories</h2>
<p th:if="${tickets.isEmpty()}" th:text="#{tickets.none}">No ticket categories yet</p>
<table th:unless="${tickets.isEmpty()}">
    <thead>
    <tr>
        <th th:text="#{ticket.label}">Label</th>
        <th th:text="#{ticket.price}">Price</th>
        <th th:text="#{ticket.seats}">Seats</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="t : ${tickets}">
        <td th:text="${t.label}">Label</td>
        <td th:text="${t.price}">Price</td>
        <td th:text="|${t.soldSeats} / ${t.totalSeats}|">0 / 100</td>
    </tr>
    </tbody>
</table>

<div th:if="${isAdmin}">
    <h3 th:text="#{tickets.add}">Add a ticket category</h3>
    <form th:action="@{/asbls/{slug}/events/{eventId}/tickets(slug=${asbl.slug},eventId=${event.id})}"
          th:object="${ticketForm}" method="post">
        <div>
            <label for="label" th:text="#{ticket.label}">Label</label>
            <input type="text" id="label" th:field="*{label}">
            <span th:if="${#fields.hasErrors('label')}" th:errors="*{label}"></span>
        </div>
        <div>
            <label for="price" th:text="#{ticket.price}">Price</label>
            <input type="number" step="0.01" id="price" th:field="*{price}">
            <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
        </div>
        <div>
            <label for="totalSeats" th:text="#{ticket.seats}">Seats</label>
            <input type="number" id="totalSeats" th:field="*{totalSeats}">
            <span th:if="${#fields.hasErrors('totalSeats')}" th:errors="*{totalSeats}"></span>
        </div>
        <button type="submit" th:text="#{tickets.add}">Add</button>
    </form>
</div>

<p><a th:href="@{/asbls/{slug}/events(slug=${asbl.slug})}" th:text="#{events.title}">Events</a></p>
</body>
</html>
