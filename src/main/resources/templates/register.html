<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title th:text="#{register.title}">Créer un compte</title>
</head>
<body>
<nav>
    <a th:href="@{/register(lang='fr')}" th:text="#{lang.fr}">Français</a>
    <a th:href="@{/register(lang='nl')}" th:text="#{lang.nl}">Nederlands</a>
    <a th:href="@{/register(lang='en')}" th:text="#{lang.en}">English</a>
</nav>

<h1 th:text="#{register.title}">Créer un compte</h1>

<form th:action="@{/register}" th:object="${form}" method="post">
    <div>
        <label for="name" th:text="#{register.name}">Nom</label>
        <input type="text" id="name" th:field="*{name}">
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>
    <div>
        <label for="email" th:text="#{register.email}">Adresse e-mail</label>
        <input type="email" id="email" th:field="*{email}">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>
    <div>
        <label for="password" th:text="#{register.password}">Mot de passe</label>
        <input type="password" id="password" th:field="*{password}">
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>
    <button type="submit" th:text="#{register.submit}">Créer le compte</button>
</form>

<p><a th:href="@{/login}" th:text="#{register.haveAccount}">J'ai déjà un compte</a></p>
</body>
</html>
